<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Parcelas</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
    font-family: 'Segoe UI';
    background:#eef2f7;
    margin:0;
}

.container{
    padding:15px;
    max-width:1000px;
    margin:auto;
}

.header{
    background:linear-gradient(135deg,#1e73be,#155a96);
    color:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.card{
    background:white;
    margin-top:10px;
    padding:10px;
    border-radius:10px;
}

.summary{
    display:flex;
    gap:10px;
}

.box{
    flex:1;
    text-align:center;
    padding:10px;
    border-radius:10px;
    font-weight:bold;
}

.total{background:#d4edda;}
.pendente{background:#ffeeba;}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

th{
    background:#1e73be;
    color:white;
}

td,th{
    padding:5px;
    text-align:center;
}

.nome{text-align:left;}

.checkbox{
    width:20px;
    height:20px;
    border:2px solid #ccc;
    border-radius:5px;
    margin:auto;
}

.pago{
    background:#28a745;
}

.progress{
    height:6px;
    background:#ddd;
    border-radius:5px;
}

.progress div{
    height:6px;
    background:#28a745;
}

button{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1e73be;
    color:white;
    font-size:15px;
}
</style>
</head>

<body>

<div class="container" id="relatorio">

<div class="header">
<h2>📊 Controle de Parcelas</h2>
<div id="data"></div>
</div>

<div class="card summary">
<div class="box total">💰 R$ <span id="arrecadado">0.00</span></div>
<div class="box pendente">📌 R$ <span id="pendente">0.00</span></div>
</div>

<div class="card">
<h3>🏆 Ranking</h3>
<div id="ranking"></div>
</div>

<div class="card">
<table id="tabela"></table>
</div>

</div>

<button onclick="gerarImagem()">📸 Gerar Imagem</button>
<button onclick="gerarWhatsApp()">📲 WhatsApp</button>

<script>

// CONFIGURAÇÃO
const pessoas = [
{nome:"Wanderson",valor:43.50},
{nome:"Rayssa",valor:43.50},
{nome:"Mauricelio",valor:43.50},
{nome:"Raniely",valor:43.50},
{nome:"Welyda",valor:43.50},
{nome:"Wilker",valor:43.50},
{nome:"Inês",valor:43.50},
{nome:"Leo",valor:43.50},
{nome:"Paty",valor:43.50},
{nome:"Cleane",valor:43.50},
{nome:"Laércio",valor:43.50},
{nome:"Neta",valor:43.50},
{nome:"Erick",valor:43.50},

{nome:"Cecilia",valor:21.64},
{nome:"Guilherme",valor:21.64},

{nome:"Raimundo",valor:12.50},
{nome:"Bia",valor:12.50},
{nome:"Rudson",valor:12.50},
{nome:"Letícia",valor:12.50},
{nome:"Dázim",valor:12.50}
];

const meses=7;

// CRIAR TABELA
function criar(){
let html="<tr><th>Nome</th><th>R$</th>";
for(let i=1;i<=7;i++) html+=`<th>${i}</th>`;
html+="<th>%</th></tr>";

pessoas.forEach(p=>{
html+=`<tr>
<td class="nome">${p.nome}</td>
<td>${p.valor}</td>`;

for(let i=0;i<7;i++){
html+=`<td><div class="checkbox" onclick="toggle(this)"></div></td>`;
}

html+=`<td><div class="progress"><div></div></div></td></tr>`;
});

document.getElementById("tabela").innerHTML=html;
}

// TOGGLE
function toggle(el){
el.classList.toggle("pago");
salvar();
calcular();
}

// SALVAR
function salvar(){
localStorage.setItem("dados",document.getElementById("tabela").innerHTML);
}

// CARREGAR
function carregar(){
let d=localStorage.getItem("dados");
if(d){
document.getElementById("tabela").innerHTML=d;
}else criar();
}

// CALCULAR
function calcular(){
let total=0;
let ranking=[];

document.querySelectorAll("#tabela tr").forEach((tr,i)=>{
if(i==0)return;

let nome=tr.children[0].innerText;
let valor=parseFloat(tr.children[1].innerText);
let pagos=tr.querySelectorAll(".pago").length;

total+=pagos*valor;

let perc=(pagos/7)*100;
tr.querySelector(".progress div").style.width=perc+"%";

ranking.push({nome,pagos});
});

ranking.sort((a,b)=>b.pagos-a.pagos);

document.getElementById("ranking").innerHTML=
ranking.map(r=>`🏅 ${r.nome} (${r.pagos}/7)`).join("<br>");

let totalGeral=
(13*7*43.50)+(2*7*21.64)+(5*7*12.50);

document.getElementById("arrecadado").innerText=total.toFixed(2);
document.getElementById("pendente").innerText=(totalGeral-total).toFixed(2);
}

// IMAGEM
function gerarImagem(){
html2canvas(document.querySelector("#relatorio")).then(c=>{
let a=document.createElement("a");
a.download="relatorio.png";
a.href=c.toDataURL();
a.click();
});
}

// WHATSAPP
function gerarWhatsApp(){
let msg="📊 RELATÓRIO\n\n";

document.querySelectorAll("#tabela tr").forEach((tr,i)=>{
if(i==0)return;
let nome=tr.children[0].innerText;
let pagos=tr.querySelectorAll(".pago").length;
msg+=`• ${nome} (${pagos}/7)\n`;
});

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// DATA
document.getElementById("data").innerText=new Date().toLocaleDateString();

// INIT
carregar();
calcular();

</script>

</body>
</html>
