<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Parcelas PRO+</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.header {
    background: linear-gradient(135deg, #1e73be, #155a96);
    color: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.dataTopo {
    font-size: 14px;
    margin-top: 5px;
    opacity: 0.9;
}

.card {
    background: white;
    margin-top: 15px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

h3 {
    margin-top: 15px;
}

/* NOME MAIOR */
.nome {
    text-align: left;
    font-weight: 700;
    font-size: 15px;
}

.resumoPessoa {
    font-size: 12px;
    color: #666;
}

/* CHECKBOX MODERNO */
.checkbox {
    width: 22px;
    height: 22px;
    border-radius: 8px;
    border: 2px solid #bbb;
    cursor: pointer;
    transition: 0.25s;
    position: relative;
}

.checkbox:hover {
    transform: scale(1.15);
    border-color: #1e73be;
}

.checkbox.pago {
    background: linear-gradient(135deg, #28a745, #218838);
    border: none;
    box-shadow: 0 0 6px rgba(40,167,69,0.6);
}

.checkbox.pago::after {
    content: "✔";
    color: white;
    font-size: 14px;
    position: absolute;
    top: 2px;
    left: 5px;
}

tr.pago-linha {
    background: #e9f9ee;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

th {
    background: #1e73be;
    color: white;
    padding: 6px;
}

td {
    padding: 6px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.summary {
    display: flex;
    gap: 10px;
}

.box {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
}

.total { background: #d4edda; }
.pendente { background: #ffeeba; }

.footer {
    text-align: right;
    font-size: 12px;
    margin-top: 10px;
    color: #666;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    background: #1e73be;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container" id="relatorio">

<div class="header">
<h2>📊 Controle de Parcelas PRO+</h2>
<div class="dataTopo" id="dataTopo"></div>
</div>

<div class="card summary">
<div class="box total">💰 Arrecadado<br>R$ <span id="arrecadado">0</span></div>
<div class="box pendente">📌 Pendente<br>R$ <span id="pendente">0</span></div>
</div>

<div class="card">
<h3>🚐 Hospedagem + Transporte</h3>
<table><tbody id="g1"></tbody></table>

<h3>🧒 Crianças</h3>
<table><tbody id="g2"></tbody></table>

<h3>🏠 Só hospedagem</h3>
<table><tbody id="g3"></tbody></table>
</div>

<div class="footer">
Relatório gerado em: <span id="dataRodape"></span>
</div>

</div>

<button onclick="resetar()">🧹 Resetar Tudo</button>

<script>

const meses = ["Mar","Abr","Mai","Jun","Jul","Ago","Set"];

const grupos = {
    g1: [
        {nome:"Wanderson", valor:43.50},
        {nome:"Rayssa", valor:43.50},
        {nome:"Mauricelio", valor:43.50},
        {nome:"Raniely", valor:43.50},
        {nome:"Welyda", valor:43.50},
        {nome:"Wilker", valor:43.50},
        {nome:"Inês", valor:43.50},
        {nome:"Leo", valor:43.50},
        {nome:"Paty", valor:43.50},
        {nome:"Cleane", valor:43.50},
        {nome:"Laércio", valor:43.50},
        {nome:"Neta", valor:43.50},
        {nome:"Erick", valor:43.50}
    ],
    g2: [
        {nome:"Cecilia", valor:21.64},
        {nome:"Guilherme", valor:21.64}
    ],
    g3: [
        {nome:"Raimundo", valor:12.50},
        {nome:"Bia", valor:12.50},
        {nome:"Rudson", valor:12.50},
        {nome:"Letícia", valor:12.50},
        {nome:"Dázim", valor:12.50}
    ]
};

let estado = JSON.parse(localStorage.getItem("pagamentos")) || {};

function salvar(){
    localStorage.setItem("pagamentos", JSON.stringify(estado));
}

function criarGrupo(lista, id){
    let html = "<tr><th>Nome</th><th>Parcela</th>";
    meses.forEach(m => html += `<th>${m}</th>`);
    html += "<th>Total</th></tr>";

    lista.forEach(p=>{
        html += `<tr>`;
        html += `<td class="nome">${p.nome}<div class="resumoPessoa" id="r_${p.nome}"></div></td>`;
        html += `<td>R$ ${p.valor}</td>`;

        meses.forEach((m,i)=>{
            let key = p.nome+"_"+i;
            let pago = estado[key];

            html += `<td>
                <div class="checkbox ${pago?'pago':''}" 
                onclick="toggle(this,'${key}',${p.valor})"></div>
            </td>`;
        });

        html += `<td id="total_${p.nome}">0</td>`;
        html += `</tr>`;
    });

    document.getElementById(id).innerHTML = html;
}

function toggle(el,key){
    el.classList.toggle("pago");
    estado[key] = el.classList.contains("pago");

    el.closest("tr").classList.toggle("pago-linha");

    salvar();
    calcular();
}

function calcular(){
    let total = 0;

    Object.values(grupos).flat().forEach(p=>{
        let pago = 0;

        meses.forEach((m,i)=>{
            if(estado[p.nome+"_"+i]){
                total += p.valor;
                pago++;
            }
        });

        document.getElementById("total_"+p.nome).innerText = "R$ " + (pago*p.valor).toFixed(2);
        document.getElementById("r_"+p.nome).innerText = `${pago}/7 parcelas`;
    });

    let totalGeral = Object.values(grupos).flat()
        .reduce((s,p)=>s+(p.valor*7),0);

    document.getElementById("arrecadado").innerText = total.toFixed(2);
    document.getElementById("pendente").innerText = (totalGeral-total).toFixed(2);
}

function resetar(){
    if(confirm("Apagar tudo?")){
        localStorage.removeItem("pagamentos");
        estado = {};
        iniciar();
    }
}

/* DATA E HORA */
function atualizarData(){
    let agora = new Date();

    let dataHora = agora.toLocaleString('pt-BR');

    document.getElementById("dataTopo").innerText = dataHora;
    document.getElementById("dataRodape").innerText = dataHora;
}

function iniciar(){
    criarGrupo(grupos.g1, "g1");
    criarGrupo(grupos.g2, "g2");
    criarGrupo(grupos.g3, "g3");
    calcular();
    atualizarData();
}

iniciar();

</script>

</body>
</html>
