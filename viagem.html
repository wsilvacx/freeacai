<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Parcelas PRO</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.header {
    background: linear-gradient(135deg, #1e73be, #155a96);
    color: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.card {
    background: white;
    margin-top: 15px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.summary {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.box {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
}

.total { background: #d4edda; }
.pendente { background: #ffeeba; }

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

th {
    background: #1e73be;
    color: white;
    padding: 6px;
}

td {
    padding: 6px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.nome {
    text-align: left;
    font-weight: 500;
}

.checkbox {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid #ccc;
    cursor: pointer;
}

.checkbox.pago {
    background: #28a745;
}

tr.pago-linha {
    background: #e6f7ec;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    background: #1e73be;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.resumoPessoa {
    font-size: 12px;
    color: #555;
}
</style>
</head>

<body>

<div class="container" id="relatorio">

<div class="header">
<h2>📊 Controle de Parcelas PRO</h2>
</div>

<div class="card summary">
<div class="box total">💰 Arrecadado<br>R$ <span id="arrecadado">0</span></div>
<div class="box pendente">📌 Pendente<br>R$ <span id="pendente">0</span></div>
</div>

<div class="card">
<table><tbody id="tabela"></tbody></table>
</div>

</div>

<button onclick="gerarImagem()">📸 Gerar Imagem</button>
<button onclick="gerarWhats()">📲 WhatsApp</button>
<button onclick="resetar()">🧹 Resetar Tudo</button>

<script>

const meses = ["Mar","Abr","Mai","Jun","Jul","Ago","Set"];

const pessoas = [
    {nome:"Wanderson", valor:43.50},
    {nome:"Rayssa", valor:43.50},
    {nome:"Mauricelio", valor:43.50},
    {nome:"Raniely", valor:43.50},
    {nome:"Welyda", valor:43.50},
    {nome:"Wilker", valor:43.50},
    {nome:"Inês", valor:43.50},
    {nome:"Leo", valor:43.50},
    {nome:"Paty", valor:43.50},
    {nome:"Cleane", valor:43.50},
    {nome:"Laércio", valor:43.50},
    {nome:"Neta", valor:43.50},
    {nome:"Erick", valor:43.50},

    {nome:"Cecilia", valor:21.64},
    {nome:"Guilherme", valor:21.64},

    {nome:"Raimundo", valor:12.50},
    {nome:"Bia", valor:12.50},
    {nome:"Rudson", valor:12.50},
    {nome:"Letícia", valor:12.50},
    {nome:"Dázim", valor:12.50}
];

let estado = JSON.parse(localStorage.getItem("pagamentos")) || {};

function salvar(){
    localStorage.setItem("pagamentos", JSON.stringify(estado));
}

function criar(){
    let html = "<tr><th>Nome</th><th>Parcela</th>";
    meses.forEach(m => html += `<th>${m}</th>`);
    html += "<th>Total Pago</th></tr>";

    pessoas.forEach(p=>{
        html += `<tr>`;
        html += `<td class="nome">${p.nome}<div class="resumoPessoa" id="r_${p.nome}"></div></td>`;
        html += `<td>R$ ${p.valor}</td>`;

        meses.forEach((m,i)=>{
            let key = p.nome+"_"+i;
            let pago = estado[key];

            html += `<td>
                <div class="checkbox ${pago?'pago':''}" 
                onclick="toggle(this,'${key}',${p.valor})"></div>
            </td>`;
        });

        html += `<td id="total_${p.nome}">0</td>`;
        html += `</tr>`;
    });

    document.getElementById("tabela").innerHTML = html;
    calcular();
}

function toggle(el,key,valor){
    el.classList.toggle("pago");
    estado[key] = el.classList.contains("pago");
    salvar();
    calcular();
}

function calcular(){
    let total = 0;

    pessoas.forEach(p=>{
        let pago = 0;
        meses.forEach((m,i)=>{
            if(estado[p.nome+"_"+i]){
                total += p.valor;
                pago++;
            }
        });

        document.getElementById("total_"+p.nome).innerText = "R$ " + (pago*p.valor).toFixed(2);
        document.getElementById("r_"+p.nome).innerText = `${pago}/7 parcelas`;
    });

    let totalGeral = pessoas.reduce((s,p)=>s+(p.valor*7),0);

    document.getElementById("arrecadado").innerText = total.toFixed(2);
    document.getElementById("pendente").innerText = (totalGeral-total).toFixed(2);
}

function gerarImagem(){
    html2canvas(document.querySelector("#relatorio")).then(canvas=>{
        let link = document.createElement("a");
        link.download = "relatorio.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

function gerarWhats(){
    let msg = `📊 RELATÓRIO\n💰 Arrecadado: R$ ${arrecadado.innerText}\n📌 Pendente: R$ ${pendente.innerText}`;
    window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

function resetar(){
    if(confirm("Apagar tudo?")){
        localStorage.removeItem("pagamentos");
        estado = {};
        criar();
    }
}

criar();

</script>

</body>
</html>
