<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Parcelas</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
}

h1 {
    background: #1e73be;
    color: white;
    padding: 10px;
}

table {
    margin: auto;
    border-collapse: collapse;
    background: white;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

th {
    background: #1e73be;
    color: white;
}

.pago {
    background: #4CAF50;
}

button {
    margin: 15px;
    padding: 10px 20px;
    background: #28a745;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Controle de Parcelas</h1>

<div id="tabela">

<table>
<tr>
<th>Nome</th>
<th>Parcela</th>
<th>Mar</th>
<th>Abr</th>
<th>Mai</th>
<th>Jun</th>
<th>Jul</th>
<th>Ago</th>
<th>Set</th>
</tr>

<script>
const pessoas = [
    {nome: "Wanderson", valor: 43.29},
    {nome: "Rayssa", valor: 43.29},
    {nome: "Mauricelio", valor: 43.29},
    {nome: "Raniely", valor: 43.29},
    {nome: "Welyda", valor: 43.29},
    {nome: "Wilker", valor: 43.29},
    {nome: "Inês", valor: 43.29},
    {nome: "Leo", valor: 43.29},
    {nome: "Paty", valor: 43.29},
    {nome: "Cleane", valor: 43.29},
    {nome: "Laércio", valor: 43.29},
    {nome: "Neta", valor: 43.29},
    {nome: "Erick", valor: 43.29},

    {nome: "Cecilia", valor: 21.64},
    {nome: "Guilherme", valor: 21.64},

    {nome: "Raimundo", valor: 12.07},
    {nome: "Bia", valor: 12.07},
    {nome: "Rudson", valor: 12.07},
    {nome: "Letícia", valor: 12.07},
    {nome: "Dázim", valor: 12.07}
];

const meses = 7;

pessoas.forEach(p => {
    document.write("<tr>");
    document.write(`<td>${p.nome}</td>`);
    document.write(`<td>R$ ${p.valor.toFixed(2)}</td>`);

    for(let i=0;i<meses;i++){
        document.write(`<td onclick="toggle(this)"></td>`);
    }

    document.write("</tr>");
});

function toggle(el){
    el.classList.toggle("pago");
}
</script>

</table>

</div>

<button onclick="gerarImagem()">📸 Gerar Imagem</button>

<script>
function gerarImagem(){
    html2canvas(document.querySelector("#tabela")).then(canvas => {
        let link = document.createElement("a");
        link.download = "controle.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

</body>
</html>
