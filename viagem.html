<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Parcelas</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
    margin: 0;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.header {
    background: linear-gradient(135deg, #1e73be, #155a96);
    color: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.card {
    background: white;
    margin-top: 15px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.summary {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.box {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
}

.total { background: #d4edda; }
.pendente { background: #fff3cd; }

h3 {
    margin-top: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #1e73be;
    color: white;
    padding: 6px;
}

td {
    padding: 6px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

td.nome {
    text-align: left;
    font-weight: 500;
}

.click {
    cursor: pointer;
    border-radius: 6px;
}

.pago {
    background: #28a745;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    background: #1e73be;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.footer {
    text-align: right;
    font-size: 12px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container" id="relatorio">

<div class="header">
<h2>📊 Controle de Parcelas</h2>
<div id="data"></div>
</div>

<div class="card summary">
<div class="box total">💰 Arrecadado<br>R$ <span id="arrecadado">0.00</span></div>
<div class="box pendente">📌 Pendente<br>R$ <span id="pendente">0.00</span></div>
</div>

<div class="card">

<h3>🚐 Hospedagem + Transporte</h3>
<table>
<thead>
<tr>
<th>Nome</th><th>Parcela</th>
<th>Mar</th><th>Abr</th><th>Mai</th><th>Jun</th><th>Jul</th><th>Ago</th><th>Set</th>
</tr>
</thead>
<tbody id="grupo1"></tbody>
</table>

<h3>🧒 Criança (metade)</h3>
<table>
<tbody id="grupo2"></tbody>
</table>

<h3>🏠 Só hospedagem</h3>
<table>
<tbody id="grupo3"></tbody>
</table>

</div>

<div class="footer">
Relatório gerado em: <span id="dataRodape"></span>
</div>

</div>

<button onclick="gerarImagem()">📸 Gerar Imagem para WhatsApp</button>

<script>

const meses = 7;

const grupo1 = [
"Wanderson","Rayssa","Mauricelio","Raniely","Welyda","Wilker","Inês","Leo","Paty","Cleane","Laércio","Neta","Erick"
];

const grupo2 = ["Cecilia","Guilherme"];

const grupo3 = ["Raimundo","Bia","Rudson","Letícia","Dázim"];

function criarTabela(lista, valor, id){
    let html = `
    <tr>
    <th>Nome</th><th>Parcela</th>
    <th>Mar</th><th>Abr</th><th>Mai</th><th>Jun</th><th>Jul</th><th>Ago</th><th>Set</th>
    </tr>`;

    lista.forEach(nome=>{
        html += `<tr>`;
        html += `<td class="nome">${nome}</td>`;
        html += `<td>R$ ${valor}</td>`;

        for(let i=0;i<meses;i++){
            html += `<td class="click" onclick="toggle(this, ${valor})"></td>`;
        }

        html += `</tr>`;
    });

    document.getElementById(id).innerHTML = html;
}

criarTabela(grupo1, 43.29, "grupo1");
criarTabela(grupo2, 21.64, "grupo2");
criarTabela(grupo3, 12.07, "grupo3");

function toggle(el, valor){
    el.classList.toggle("pago");
    calcular();
}

function calcular(){
    let total = 0;

    document.querySelectorAll(".pago").forEach(td=>{
        let valor = parseFloat(td.parentElement.children[1].innerText.replace("R$",""));
        total += valor;
    });

    let totalGeral =
        grupo1.length * 7 * 43.29 +
        grupo2.length * 7 * 21.64 +
        grupo3.length * 7 * 12.07;

    document.getElementById("arrecadado").innerText = total.toFixed(2);
    document.getElementById("pendente").innerText = (totalGeral - total).toFixed(2);
}

function gerarImagem(){
    html2canvas(document.querySelector("#relatorio")).then(canvas=>{
        let link = document.createElement("a");
        link.download = "relatorio.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

let hoje = new Date().toLocaleDateString();
document.getElementById("data").innerText = hoje;
document.getElementById("dataRodape").innerText = hoje;

</script>

</body>
</html>
