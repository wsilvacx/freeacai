<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Parcelas</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.header {
    background: linear-gradient(135deg, #1e73be, #155a96);
    color: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.card {
    background: white;
    margin-top: 15px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.summary {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.box {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
}

.total { background: #d4edda; }
.pendente { background: #ffeeba; }

h3 {
    margin-top: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

th {
    background: #1e73be;
    color: white;
    padding: 6px;
}

td {
    padding: 6px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.nome {
    text-align: left;
    font-weight: 500;
}

/* NOVO CHECKBOX */
.checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid #ccc;
    cursor: pointer;
    display: inline-block;
    position: relative;
    transition: 0.2s;
}

.checkbox.pago {
    background: #28a745;
    border-color: #28a745;
}

.checkbox.pago::after {
    content: "✔";
    color: white;
    font-size: 14px;
    position: absolute;
    top: 1px;
    left: 4px;
}

.checkbox:hover {
    transform: scale(1.1);
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    background: #1e73be;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.footer {
    text-align: right;
    font-size: 12px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container" id="relatorio">

<div class="header">
<h2>📊 Controle de Parcelas</h2>
<div id="data"></div>
</div>

<div class="card summary">
<div class="box total">💰 Arrecadado<br>R$ <span id="arrecadado">0.00</span></div>
<div class="box pendente">📌 Pendente<br>R$ <span id="pendente">0.00</span></div>
</div>

<div class="card">

<h3>🚐 Hospedagem + Transporte</h3>
<table><tbody id="g1"></tbody></table>

<h3>🧒 Criança (metade)</h3>
<table><tbody id="g2"></tbody></table>

<h3>🏠 Só hospedagem</h3>
<table><tbody id="g3"></tbody></table>

</div>

<div class="footer">
Relatório gerado em: <span id="dataRodape"></span>
</div>

</div>

<button onclick="gerarImagem()">📸 Gerar Imagem</button>

<script>

const meses = ["Mar","Abr","Mai","Jun","Jul","Ago","Set"];

const grupo1 = ["Wanderson","Rayssa","Mauricelio","Raniely","Welyda","Wilker","Inês","Leo","Paty","Cleane","Laércio","Neta","Erick"];
const grupo2 = ["Cecilia","Guilherme"];
const grupo3 = ["Raimundo","Bia","Rudson","Letícia","Dázim"];

function criar(lista, valor, id){
    let html = "<tr><th>Nome</th><th>Parcela</th>";

    meses.forEach(m => html += `<th>${m}</th>`);
    html += "</tr>";

    lista.forEach(nome=>{
        html += `<tr>`;
        html += `<td class="nome">${nome}</td>`;
        html += `<td>R$ ${valor.toFixed(2)}</td>`;

        meses.forEach(()=>{
            html += `<td><div class="checkbox" onclick="toggle(this, ${valor})"></div></td>`;
        });

        html += "</tr>";
    });

    document.getElementById(id).innerHTML = html;
}

criar(grupo1, 43.50, "g1");
criar(grupo2, 21.64, "g2");
criar(grupo3, 12.50, "g3");

function toggle(el, valor){
    el.classList.toggle("pago");
    calcular();
}

function calcular(){
    let total = 0;

    document.querySelectorAll(".checkbox.pago").forEach(cb=>{
        let valor = parseFloat(cb.parentElement.parentElement.children[1].innerText.replace("R$",""));
        total += valor;
    });

    let totalGeral =
        grupo1.length * 7 * 43.50 +
        grupo2.length * 7 * 21.64 +
        grupo3.length * 7 * 12.50;

    document.getElementById("arrecadado").innerText = total.toFixed(2);
    document.getElementById("pendente").innerText = (totalGeral - total).toFixed(2);
}

function gerarImagem(){
    html2canvas(document.querySelector("#relatorio")).then(canvas=>{
        let link = document.createElement("a");
        link.download = "relatorio.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

let hoje = new Date().toLocaleDateString();
document.getElementById("data").innerText = hoje;
document.getElementById("dataRodape").innerText = hoje;

</script>

</body>
</html>
